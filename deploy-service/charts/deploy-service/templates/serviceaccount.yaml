{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "deploy-service.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
{{ include "deploy-service.labels" . | indent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "deploy-service.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "deploy-service.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ template "deploy-service.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "deploy-service.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups:
      - "*"
    resources:
      - '*'
    verbs:
      - "*"
{{- end -}}
