---
openapi: "3.0.2"
info:
  title: "DeployService 微服务的 API 文档"
  version: "1.0.0"
  description: |
    - 健康检查
    - 激活升级
    - 模块服务
    - 配置管理
    - 通信框架
    - 客户端升级
servers:
- url: "http://{host}:{port}/api/deploy-manager/v1"
  variables:
    host:
      default: "deploy-service.anyshare.svc.cluster.local"
      enum:
      - "deploy-service.anyshare.svc.cluster.local"
      - "127.0.0.1"
      description: "集群地址"
    port:
      enum:
      - "9703"
      default: "9703"
tags:
- name: "健康检查"
- name: "激活升级"
- name: "模块服务"
- name: "配置管理"
- name: "通信框架"
- name: "客户端"
components:
  responses:
    OKResponse:
      description: "请求成功"
    StandardsErrorResponse:
      description: "标准错误响应"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardsErrorObject"
    ClientPackageUpgradeResponse:
      description: "检查客户端是否有更新"
      content:
        application/json:
          schema:
            description: ""
            required:
            - "os_type"
            - "version"
            type: "object"
            properties:
              name:
                description: "升级包名称"
                type: "string"
              version:
                description: "版本号"
                type: "string"
              terminator:
                description: "是否强制升级"
                type: "string"
              update_type:
                description: "升级类型"
                enum:
                - "custom"
                - "standard"
                type: "string"
              os_type:
                description: "OS系统"
                enum:
                - "android"
                - "mac"
                - "ios"
                - "win32_advanced"
                - 'win64_advanced'
                - "linux_x64_rpm"
                - "linux_arm64_rpm"
                - "linux_mips64_rpm"
                - "linux_x64_deb"
                - "linux_x64_AppImage"
                - "linux_arm64_deb"
                - "linux_arm64_AppImage"
                - "linux_mips64_deb"
                - "officeplugin_x86"
                - "officeplugin_x64"
                - "officeplugin_mac"
                type: "string"
              silence:
                description: "是否静默升级"
                type: "boolean"
            example:
              name: "Anyshare_ALL_......"
              os_type: "ios"
              version: "1.0.2.2.222"
              terminator: "true"
              update_type: "standard"
              silence: ture
        text/xml:
          schema:
            description: ""
            required:
            - "os_type"
            - "version"
            type: "object"
            properties:
              name:
                description: "升级包名称"
                type: "string"
              version:
                description: "版本号"
                type: "string"
              terminator:
                description: "是否强制升级"
                type: "string"
              os_type:
                description: "OS系统"
                enum:
                - "android"
                - "mac"
                - "ios"
                - "win32_advanced"
                - 'win64_advanced'
                - "linux_x64_rpm"
                - "linux_arm64_rpm"
                - "linux_mips64_rpm"
                - "linux_x64_deb"
                - "linux_x64_AppImage"
                - "linux_arm64_deb"
                - "linux_arm64_AppImage"
                - "linux_mips64_deb"
                - "officeplugin_x86"
                - "officeplugin_x64"
                - "officeplugin_mac"
                type: "string"
            example:
              name: ""
              os_type: "ios"
              version: "-1"
              terminator: ""
  requestBodies:
    ThirdAppRequestBody:
      description: "第三方需要修改的配置信息"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ThirdAppDepServicesInfo"

  schemas:
    UpgradeStatus:
      description: 升级状态
      type: object
      properties:
        status:
          type: string
          description: 升级状态
          enum:
            - upgrade_start
            - upgrade_running
            - upgrade_failed
            - upgrade_success
        start:
          type: string
          description: 升级开始时间
        name:
          type: string
          description: 服务名
        type:
          type: string
          description: 服务类型
        messages:
          type: array
          description: 所有的升级信息
          items:
            type: object
            description: 一条升级消息
            properties:
              index:
                type: number
                description: 消息序号
              time:
                type: string
                description: 消息产生时间
              message:
                type: string
                description: 消息具体内容
    ActivationJsonObject:
      type: "object"
      description: "激活AnyShare时使用的参数对象"
      required:
      - "activation_ip"
      properties:
        activation_ip:
          type: "string"
          default: "127.0.0.1"
          description: "激活时使用的IP"
    StandardsErrorObject:
      type: "object"
      description: "标准错误对象"
      required:
      - "code"
      - "message"
      - "cause"
      properties:
        code:
          type: "string"
          default: "400000001"
          description: "错误码"
        message:
          type: "string"
          description: "错误信息"
        cause:
          type: "string"
          default: "NCT_XXXXXXXXXXXX"
          description: "错误原因"
    UploadModulePackageObject:
      type: "object"
      description: "上传模块化服务包需要的参数对象"
      required:
      - "package_path"
      properties:
        package_path:
          type: "string"
          description: "模块化服务包在服务器上的路径"
        service:
          type: "string"
          description: "模块化服务名"
    ModuleServiceInformation:
      type: "object"
      description: "模块化服务信息"
      required:
      - "service_name"
      - "installed_version"
      - "available_version"
      - "available_package"
      - "replicas"
      properties:
        service_name:
          type: "string"
          description: "模块化服务名"
        installed_version:
          type: "string"
          description: "安装的服务包版本信息"
        available_version:
          type: "string"
          description: "可用的服务包版本信息"
        available_package:
          type: "string"
          description: "可用的包服务包信息"
        replicas:
          type: "integer"
          default: 0
          description: "模块服务安装的副本数"
        nodes:
          type: "array"
          description: "服务安装的节点"
          items:
            type: "string"
            example: "1.1.1.1"
        third_app_service:
          type: "array"
          items:
            type: "object"
            properties:
              third_app_service:
                type: "string"
                description: "第三方服务名"
                example: "hehe"
              components:
                type: "array"
                description: "组件列表"
                items:
                  type: "string"
                  example: "document"
        require:
          type: "boolean"
          description: "是否强依赖第三方服务"
          example: "true"
        micro_services:
          type: "array"
          description: "模块服务包含的微服务列表"
          items:
            type: "string"
            example: "svc1"
        installed_micro_services:
          type: "array"
          description: "已经安装的微服务列表"
          items:
            type: "string"
            example: "svc1"
    ThirdAppDepServicesInfo:
      type: "object"
      description: "第三方依赖服务配置信息"
      required:
      - "data"
      properties:
        data:
          $ref: "#/components/schemas/ThirdAppDepServicesInfoData"
    ThirdAppDepServicesInfoData:
      type: "object"
      description: "第三方依赖服务配置信息"
      required:
      - "id"
      - "service_name"
      - "micro_service"
      - "belong"
      - "components_name"
      - "third_app_depservice_id"
      properties:
        id:
          type: "string"
        service_name:
          type: "string"
        micro_service:
          type: "string"
        belong:
          type: "string"
        components_name:
          type: "string"
        third_app_depservice_id:
          type: "string"
    MicroServiceConfigObject:
      description: "微服务配置参数对象"
      type: "object"
      properties:
        os-language:
          description: "系统语言\n选项：\nlanguage"
          type: "string"
        dep-services:
          description: "依赖服务选项\nrds mysql数据库\nservices 其他依赖服务"
          enum:
          - "rds"
          - "services"
          type: "string"
        os-timezone:
          description: "系统时区\n选项：timezone"
          type: "string"
        micro-service-language:
          description: "微服务全球化语言配置\n选项：language"
          type: "string"
      example:
        os-timezone: "timezone"
    ClientPackageInfoObject:
      description: "客户端安装包信息"
      required:
      - "open_download"
      - "update_type"
      - "mode"
      - "os_type"
      - "size"
      - "time"
      - "version"
      type: "object"
      properties:
        name:
          description: "升级包名称"
          type: "string"
        url:
          description: "下载地址"
          type: "string"
        version:
          description: "版本号"
          type: "string"
        mode:
          description: "是否强制更新"
          type: "boolean"
        time:
          description: "上传时间"
          type: "string"
        size:
          format: "int32"
          description: "大小"
          type: "integer"
        open_download:
          description: "是否开放下载"
          type: "boolean"
        update_type:
          description: "升级包类型(standard/custom)"
          enum:
            - "standard"
            - "custom"
          type: "string"
        os_type:
          description: "OS系统"
          enum:
          - "android"
          - "mac"
          - "ios"
          - "win32_advanced"
          - 'win64_advanced'
          - "linux_x64_rpm"
          - "linux_arm64_rpm"
          - "linux_mips64_rpm"
          - "linux_x64_deb"
          - "linux_x64_AppImage"
          - "linux_arm64_deb"
          - "linux_arm64_AppImage"
          - "linux_mips64_deb"
          - "officeplugin_x86"
          - "officeplugin_x64"
          - "officeplugin_mac"
          type: "string"
      example:
        update_type: "standard"
        name: "AnyShare_All_Linux_arm64-7.0.1.2-20200221-Terminator-520.deb"
        url: ""
        version: "7.0.1.2(520)"
        mode: true
        time: "2020/11/13 14:15:13"
        os_type: "linux_arm64_deb"
        open_download: true
        size: 39102199
    SetDownloadInfoData:
      description: "设置客户端下载地址信息"
      required:
      - "url"
      - "os_type"
      type: "object"
      properties:
        name:
          description: "升级包名称"
          type: "string"
        open_download:
          description: "是否开放下载，默认true"
          type: "boolean"
        url:
          description: "下载地址"
          type: "string"
        os_type:
          description: "OS系统"
          enum:
          - "android"
          - "mac"
          - "ios"
          - "win32_advanced"
          - 'win64_advanced'
          - "linux_x64_rpm"
          - "linux_arm64_rpm"
          - "linux_mips64_rpm"
          - "linux_x64_deb"
          - "linux_x64_AppImage"
          - "linux_arm64_deb"
          - "linux_arm64_AppImage"
          - "linux_mips64_deb"
          - "officeplugin_x86"
          - "officeplugin_x64"
          - "officeplugin_mac"
          type: "string"
        version_description:
          description: "安装包描述"
          type: "string"
      example:
        name: "some text"
        version_description: "ios 7.0.5.5 更新包"
        open_download: true
        url: "http://......"
        os_type: "ios"
    DownloadUrlData:
      description: "获取下载地址参数"
      required:
      - "os_type"
      - "req_host"
      type: "object"
      properties:
        os_type:
          description: "系统类型"
          enum:
          - "android"
          - "mac"
          - "ios"
          - "win32_advanced"
          - 'win64_advanced'
          - "linux_x64_rpm"
          - "linux_arm64_rpm"
          - "linux_mips64_rpm"
          - "linux_x64_deb"
          - "linux_x64_AppImage"
          - "linux_arm64_deb"
          - "linux_arm64_AppImage"
          - "linux_mips64_deb"
          - "officeplugin_x86"
          - "officeplugin_x64"
          - "officeplugin_mac"
          type: "string"
        req_host:
          description: "请求主机"
          type: "string"
        user_oss_id:
          description: "用户对应的ossid，不传该参数，走默认下载地址"
          type: "string"          
      example:
        os_type: "linux_arm64_rpm"
        req_host: "10.5.161.1"
        user_oss_id: "789FF7EABE1F455B870FCCCE4F21693D"
    CertInfoData:
      description: "证书信息"
      type: "object"
      properties:
        startDate:
          format: "date"
          description: "有效期开始日期"
          type: "string"
        expireDate:
          format: "date"
          description: "有效期过期日期"
          type: "string"
        hasExpired:
          format: "int32"
          description: "是否过期"
          type: "integer"
        accepter:
          description: "证书接受者"
          type: "string"
        certType:
          description: "证书类型"
          type: "string"
        issuer:
          description: "证书颁发者"
          type: "string"
        certSource:
          description: "证书来源"
          enum:
            - "self-signed" # 自签名
            - "customer-upload" # 客户上传
            - "unknown" # 未知
          type: "string"
      example:
        startDate: "2020/07/14"
        expireDate: "2021/07/14"
        hasExpired: 0
        accepter: "10.5.161.3"
        certType: "app"
        issuer: "AnyShare"
    AccessAddrObject:
      description: "访问地址数据对象"
      type: "object"
      properties:
        host:
          description: "访问地址的host，域名或ip"
          type: "string"
        port:
          description: "访问地址的port"
          type: "string"
        type:
          description: "访问地址的类型"
          type: "string"
          enum:
            - "internal"
            - "external"
        scheme:
          description: "访问地址的协议"
          type: "string"
          enum:
            - "https"
            - "http"
        path:
          description: "访问地址的前缀信息"
          type: "string"
      example:
        host: "10.2.64.150"
        port: "10443"
        type: "internal"
        scheme: "https"
        path: "/"
    ThirdPatryServiceObject:
      description: "第三方服务配置"
      type: object
      required:
      - protocol
      - host
      properties:
        protocol:
          description: "第三方服务配置协议"
          type: "string"
        host:
          description: "第三方服务配置host"
          type: "string"
        port:
          description: "第三方服务配置port, 默认443(https), 80(http)"
          type: "integer"
paths:
  /health/alive:
    get:
      tags:
      - "健康检查"
      summary: "存活检查"
      description: "检查存活状态的探针接口"
      responses:
        "200":
          description: "OK"
  /health/ready:
    get:
      tags:
      - "健康检查"
      summary: "就绪检查"
      description: "检查就绪状态的探针接口"
      responses:
        "200":
          description: "OK"
  /containerized/anyshare/active:
    put:
      summary: "激活AnyShare"
      description: "初次部署时激活AnyShare集群"
      tags:
      - "激活升级"
      requestBody:
        description: "激活集群时需要提供的参数信息"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivationJsonObject"
            examples:
              activation_object:
                summary: "激活参数示例"
                value:
                  activation_ip: "127.0.0.1"
      responses:
        "200":
          description: "激活成功"
        "400":
          description: "激活失败"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
        "500":
          description: "激活失败"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                default:
                  value:
                    code: 500
                    message: "active deploy failed."
                    cause: "xxxxxxxxx"
  /containerized/anyshare/app/upgradation:
    put:
      summary: "升级应用服务"
      description: "AnyShare升级时升级应用服务"
      tags:
      - "激活升级"
      responses:
        "200":
          description: "OK"
        "500":
          description: "升级失败"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                default:
                  value:
                    code: "500017000"
                    message: "upgrade service package failed."
                    cause: "xxxxxxxxx"
        "423":
          description: "任务处理中"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                forbidden:
                  value:
                    code: "423017002"
                    message: "Refuse to process duplicate requests "
                    cause: "NCT_FORBIDDEN_DUPLICATE_REQUEST"
  /containerized/anyshare/basic/upgradation:
    put:
      summary: "升级基础服务"
      description: "AnyShare升级时升级基础服务"
      tags:
      - "激活升级"
      responses:
        "200":
          description: "OK"
        "500":
          description: "升级失败"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                default:
                  value:
                    code: "500017000"
                    message: "upgrade service package failed."
                    cause: "xxxxxxxxx"
                forbidden:
                  value:
                    code: "423017002"
                    message: "Refuse to process duplicate requests "
                    cause: "NCT_FORBIDDEN_DUPLICATE_REQUEST"
  /containerized/service/{service}/{node}:
    parameters:
    - name: "service"
      description: "模块化服务名"
      in: "path"
      required: true
      schema:
        type: "string"
    - name: "node"
      description: "操作的节点列表"
      in: "path"
      required: true
      schema:
        type: "string"
    put:
      summary: "安装模块服务"
      tags:
      - "模块服务"
      description: "安装，增加模块服务节点"
      parameters:
      - name: "micro_service"
        description: "需要安装的微服务"
        in: "query"
        style: form
        required: false
        schema:
          type: "array"
          items:
            type: "string"
      - name: "optional_install_micro_service"
        description: "是否可选的安装部分微服务"
        in: "query"
        style: form
        required: false
        schema:
          type: "boolean"
      responses:
        "200":
          description: "OK"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                "模块服务未包含该微服务":
                  value:
                    code: 404017100
                    message: "install micro service failed"
                    cause: "NCT_MICRO_SERVICE_NOT_FOUND_IN_MODULE_SERVICE"
        "409":
          description: "Conflict"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                "微服务已被其他模块服务安装":
                  value:
                    code: 409017001
                    message: "install micro service failed"
                    cause: "NCT_MICRO_SERVICE_ALREADY_INSTALLED_BY_OTHER_MODULE_SERVICE"
        "500":
          description: "安装，增加模块服务节点失败"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                default:
                  value:
                    code: "500017000"
                    message: "add service node faild."
                    cause: "xxxxxxxxx"
    delete:
      summary: "卸载模块服务"
      tags:
      - "模块服务"
      description: "移除，卸载模块服务节点"
      responses:
        "200":
          description: "OK"
        "500":
          description: "移除，卸载模块服务节点失败"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                default:
                  value:
                    code: "500017000"
                    message: "remove service node failed."
                    cause: "xxxxxxxxx"
  /containerized/service/{service}/micro-services:
    post:
      summary: "安装微服务"
      description: "安装模块服务的微服务"
      tags:
      - "模块服务"
      requestBody:
        description: "请求体"
        content:
          application/json:
            schema:
              type: "object"
              properties:
                micro_services:
                  type: "array"
                  description: "微服务列表"
                  items:
                    type: "string"
                    example: "svc1"
      parameters:
        - name: service
          in: path
          description: 指定需要安装微服务的服务名称
          required: true
          example: Observability
          schema:
            type: string
      responses:
        "201":
          description: "OK"
        "400":
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                "模块服务未安装":
                  value:
                    code: 400017240
                    message: "install micro service failed"
                    cause: "NCT_SERVICE_NOT_INSTALLED"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                "模块服务未包含该微服务":
                  value:
                    code: 404017100
                    message: "install micro service failed"
                    cause: "NCT_MICRO_SERVICE_NOT_FOUND_IN_MODULE_SERVICE"
        "409":
          description: "Conflict"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsErrorObject"
              examples:
                "微服务已被其他模块服务安装":
                  value:
                    code: 409017001
                    message: "install micro service failed"
                    cause: "NCT_MICRO_SERVICE_ALREADY_INSTALLED_BY_OTHER_MODULE_SERVICE"
        "500":
