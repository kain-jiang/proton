  /v1/upgradation/{service_type}/{service}:
    parameters:
      - name: service
        in: path
        description: "模块服务名"
        required: true
        schema:
          type: string
      - name: service_type
        in: path
        description: "升级类型"
        required: true
        schema:
          type: string
          enum:
            - modular-service
          # - micro-service

    put:
      summary: 开始升级模块服务
      description: 开始升级模块服务
      responses:
        200:
          description: 任务创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  upgrade_id:
                    type: string
                    description: 升级任务ID
              examples:
                创建成功:
                  value:
                    upgrade_id: 4ec8cc4e-fbcc-4882-8436-8e7ce7683c72

        400:
          description: 升级模块服务失败
          content:
            applcation/json:
              schema:
                type: "object"
                description: "标准错误对象"
                required:
                  - "code"
                  - "message"
                  - "cause"
                properties:
                  code:
                    type: "string"
                    default: "400000001"
                    description: "错误码"
                  message:
                    type: "string"
                    description: "错误信息"
                  cause:
                    type: "string"
                    default: "NCT_XXXXXXXXXXXX"
                    description: "错误原因"
              examples:
                服务正在升级:
                  value:
                    code: "400018007"
                    message: "service is upgrading"
                    cause: "NCT_UPGRADE_SERVICE_RUNNING"
    get:
      summary: 获取升级状态
      description: 获取升级状态，或者查询升级历史记录
      parameters:
        - name: history
          in: query
          description: 是否获取历史升级记录
          schema:
            type: string
        - name: upgrade_id
          in: query
          description: 升级任务ID, 不填写将会查询最后一个升级任务
          schema:
            type: string
      responses:
        200:
          description: 获取升级状态成功
          content:
            applcation/json:
              schema:
                $ref: "#/components/schemas/UpgradeStatus"
              examples:
                获取升级状态:
                  value:
                    start: 2022-05-10 14-43
                    status: upgrade_running
                    name: ManagementConsole
                    type: modular-service
                    messages:
                      - index: 1
                        time: 2022-05-10 14:43
                        message: 开始升级
                      - index: 2
                        time: 2022-05-10 14:44
                        message: 正在升级webconsole服务
                      - index: 3
                        time: 2022-05-10 14:45
                        message: 正在升级xxx服务
