{{- if .Values.config.enable }}
kind: ConfigMap
apiVersion: v1
metadata:
  name: nginx-configuration-{{ include "ingressClassName" . }}
  namespace: {{ .Release.Namespace}}
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
data:
  {{- range $key, $val := .Values.config.nginxData }}
  {{ $key }}: {{ $val | quote }}
  {{- end}}
{{- end }}