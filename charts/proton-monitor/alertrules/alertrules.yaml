          title: Pod Container Restarts Hourly ≥ 4
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: P1C01134CD6DBEE56
              model:
                disableTextWrap: false
                editorMode: builder
                expr: increase(kube_pod_container_status_restarts_total[1h])
                fullMetaSearch: false
                includeNullMetadata: true
