    - orgId: 1
      name: OpenSearch
      folder: AlertRule
      interval: 1m
      rules:
        - uid: bephjfvzd3dhcf
          title: OpenSearch Node Shards Allocation > 90%
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: P1C01134CD6DBEE56
              model:
                disableTextWrap: false
                editorMode: code
                expr: opensearch_node_shards_total{node!=""} / ignoring(node) group_left opensearch_clustersettings_stats_max_shards_per_node
                fullMetaSearch: false
                includeNullMetadata: true
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
                useBackend: false
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0.9
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
