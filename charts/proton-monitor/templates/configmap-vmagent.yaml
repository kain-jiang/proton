apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-config
  namespace: {{ .Values.namespace }}
data:
  scrape.yml: |
    global:
      scrape_interval: {{ .Values.config.vmagent.scrape_interval }}
      scrape_timeout: {{ .Values.config.vmagent.scrape_timeout }}
    {{- if .Values.config.vmagent.remote_write }}
    remote_write:
      {{- toYaml .Values.config.vmagent.remote_write | nindent 6 }}
    {{- end }}

    scrape_configs:
      # API Serevrs
      - job_name: kubernetes-apiservers
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - action: keep
            source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
              - __meta_kubernetes_endpoint_port_name
            regex: default;kubernetes;https


      - job_name: kubernetes-etcd
        scheme: https
        tls_config:
          ca_file: /etc/vmagent/certs/ca.crt
          cert_file: /etc/vmagent/certs/healthcheck-client.crt
          key_file: /etc/vmagent/certs/healthcheck-client.key
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: replace
            source_labels: [__address__]
            target_label: __address__
            replacement: $1:2379
          - action: keep
            source_labels: [__meta_kubernetes_namespace]
            regex: kube-system
          - action: keep
            source_labels: [__meta_kubernetes_pod_label_component]
            regex: etcd
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod


      # node(kubelet)
      - job_name: kubernetes-nodes
        scheme: https
        metrics_path: /metrics
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)


      # Kubelet cAdvisor
      - job_name: kubernetes-cadvisor
        scheme: https
        metrics_path: /metrics/cadvisor
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
        - source_labels: [__meta_kubernetes_node_address_InternalIP]
          action: replace
          target_label: __address__
          regex: (.+)
          replacement: ${1}:10250

      # service endpoints
      - job_name: kubernetes-services-endpoints
        honor_labels: true
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            regex: true
          - action: drop
            source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape_slow]
            regex: true
          - action: replace
            source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
            regex: (https?)
            target_label: __scheme__
          - action: replace
            source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            regex: (.+)
            target_label: __metrics_path__
          - action: replace
            source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            regex: ([^:]+)(?::\d+)?;(\d+)
            target_label: __address__
            replacement: $1:$2
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      #pods
      - job_name: kubernetes-pods
        honor_labels: true
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: true
          - action: drop
            source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape_slow]
            regex: true
          - action: replace
            source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
            regex: (https?)
            target_label: __scheme__
          - action: replace
            source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            regex: (.+)
            target_label: __metrics_path__
          - action: replace
            source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            regex: ([^:]+)(?::\d+)?;(\d+)
            target_label: __address__
            replacement: $1:$2
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: drop
            source_labels: [__meta_kubernetes_pod_phase]
            regex: Pending|Succeeded|Failed|Completed
