apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: {{ .Values.namespace }}
data:
  provisioning.yaml: |-
    apiVersion: 1
    
    providers:
      # 使用文件系统加载 dashboard
      - name: 'ProtonDashboards'
        orgId: 1
        folder: 'Proton'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /data/grafana/provisioning/dashboards/dashboards
          foldersFromFilesStructure: false
