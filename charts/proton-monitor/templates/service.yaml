# 内部 Grafana 服务 (ClusterIP)，用于内部访问和监控抓取
apiVersion: v1
kind: Service
metadata:
  name: proton-monitor-grafana-internal
  namespace: {{ .Values.namespace }}
  labels:
    app: proton-monitor
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "{{ .Values.config.grafana.port }}"
spec:
  type: ClusterIP
  selector:
    app: proton-monitor
  ports:
    - name: metrics
      port: {{ .Values.config.grafana.port }}
      targetPort: {{ .Values.config.grafana.port }}
      protocol: TCP
---
# 为每个 StatefulSet Pod 创建单独的 NodePort 服务
{{- $replicas := int .Values.replicaCount }}
{{- $last := sub $replicas 1 }}
{{- range $i := until $replicas }}
apiVersion: v1
kind: Service
metadata:
  name: proton-monitor-grafana-{{ $i }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: proton-monitor
    pod-specific: "true"
spec:
  type: NodePort
  selector:
    app: proton-monitor
    statefulset.kubernetes.io/pod-name: proton-monitor-{{ $i }}
  ports:
    - name: metrics
      port: {{ $.Values.config.grafana.port }}
      targetPort: {{ $.Values.config.grafana.port }}
      {{- if eq $i 0 }}
      nodePort: {{ $.Values.config.grafana.nodePort }}
      {{- else }}
      nodePort: {{ add $.Values.config.grafana.nodePort $i }}
      {{- end }}
      protocol: TCP
{{- if ne $i $last }}
---
{{- end }}
{{- end }}
---
