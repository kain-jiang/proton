kind: Service
apiVersion: v1
metadata:
  name: proton-monitor-dcgm-exporter
  namespace: {{ .Values.namespace }}
  labels:
    app: "proton-monitor-ds"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "{{ .Values.config.dcgmExporter.port }}"
spec:
  selector:
    app: "proton-monitor-ds"
  ports:
    - name: metrics
      port: {{ .Values.config.dcgmExporter.port }}
      targetPort: {{ .Values.config.dcgmExporter.port }}
      protocol: TCP
---
