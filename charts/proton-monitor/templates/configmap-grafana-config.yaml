    default_home_dashboard_path = /data/grafana/provisioning/dashboards/dashboards/node.json

    [live]
    max_connections = 100

    message_size_limit = 65536

    allowed_origins =

    ha_engine =

    ha_engine_address = "127.0.0.1:6379"

    ha_engine_password = ""

    ha_prefix =

    [plugin.grafana-image-renderer]
    rendering_timezone =

    rendering_language =

    rendering_viewport_device_scale_factor =

    rendering_ignore_https_errors =

    rendering_verbose_logging =

    rendering_dumpio =

    rendering_timing_metrics =

    rendering_tracing_url =

    rendering_args =

    rendering_chrome_bin =

    rendering_mode =

    rendering_clustering_mode =
    rendering_clustering_max_concurrency =
    rendering_clustering_timeout =

    rendering_viewport_max_width =
    rendering_viewport_max_height =
    rendering_viewport_max_device_scale_factor =

    grpc_host =
    grpc_port =

    [enterprise]
    license_path =

    [feature_toggles]

    enable =



    [feature_toggles.openfeature]
    provider = static

    [feature_toggles.openfeature.context]

    [date_formats]

    full_date = YYYY-MM-DD HH:mm:ss

    interval_second = HH:mm:ss
    interval_minute = HH:mm
    interval_hour = MM/DD HH:mm
    interval_day = MM/DD
    interval_month = YYYY-MM
    interval_year = YYYY

    use_browser_locale = false

    default_timezone = browser

    [expressions]
    enabled = true

    [geomap]
    default_baselayer_config =

    enable_custom_baselayers = true

    [support_bundles]
    enabled = true
    server_admin_only = true
    public_keys = ""


    [storage]
    allow_unsanitized_svg_upload = false



    [search]
    dashboard_loading_batch_size = 200

    full_reindex_interval = 5m

    index_update_interval = 10s


    [navigation.app_sections]

    [navigation.app_standalone_pages]


    [secure_socks_datasource_proxy]
    enabled = false
    root_ca_cert =
    client_key =
    client_cert =
    server_name =
    proxy_address =
    show_ui = true
    allow_insecure = false

    [feature_management]
    allow_editing = false

    update_webhook =

    update_webhook_token =

    hidden_toggles =

    read_only_toggles =

    [plugin.victoriametrics-logs-datasource]
    timeout = 120
    max_concurrent_queries = 5
    query_timeout = 60
    max_lines_per_request = 10000

    [public_dashboards]
    enabled = true

    [cloud_migration]
    is_target = false
    gcom_api_token = ""
    start_snapshot_timeout = 5s
    validate_key_timeout = 5s
    get_snapshot_status_timeout = 5s
    create_upload_url_timeout = 5s
    report_event_timeout = 5s
    fetch_instance_timeout = 5s
    create_access_policy_timeout = 5s
    fetch_access_policy_timeout = 5s
    delete_access_policy_timeout = 5s
    domain = grafana.net
    snapshot_folder = ""
    feedback_url = https://docs.google.com/forms/d/e/1FAIpQLSeEE33vhbSpR8A8S1A1ocZ1ByVRRwiRl1GZr2FSrEer_tSa8w/viewform?usp=sf_link
    frontend_poll_interval = 2s
    alert_rules_state = "paused"

    [frontend_dev]
    fail_tests_on_console = true
    mock_api = false
    betterer_eslint_rules = false
