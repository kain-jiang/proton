apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: {{ .Values.namespace }}
data:
  grafana.ini: |
    app_mode = production
    instance_name = ${HOSTNAME}
    
    [log]
    level = debug
    filters = plugin.victoriametrics-logs-datasource:debug

    [smtp]
    enabled = {{ .Values.config.grafana.smtp.enabled }}
    host = {{ .Values.config.grafana.smtp.host }}
    user = {{ .Values.config.grafana.smtp.user }}
    password = {{ .Values.config.grafana.smtp.password }}
    skip_verify = {{ .Values.config.grafana.smtp.skip_verify }}
    from_address = {{ .Values.config.grafana.smtp.from }}
    from_name = {{ .Values.config.grafana.smtp.from_name }}
    startTLS_policy = {{ .Values.config.grafana.smtp.startTLS_policy }}
    enable_tracing = {{ .Values.config.grafana.smtp.enable_tracing }}

    [smtp.static_headers]

    [emails]
    welcome_email_on_sign_up = false
    templates_pattern = emails/*.html, emails/*.txt
    content_types = text/html

    [paths]
    data = /data/grafana
    temp_data_lifetime = 24h
    logs = /data/grafana/log
    plugins = /usr/share/grafana/plugins
    provisioning = /data/grafana/conf/provisioning

    [plugins]
    enable_alpha = false
    app_tls_skip_verify_insecure = false
    allow_loading_unsigned_plugins = victoriametrics-logs-datasource
    plugin_admin_enabled = true
    plugin_admin_external_manage_enabled = false
    plugin_catalog_url = https://grafana.com/grafana/plugins/
    plugin_catalog_hidden_plugins =
    log_backend_requests = true
    public_key_retrieval_disabled = false
    public_key_retrieval_on_startup = false
    disable_plugins =
    hide_angular_deprecation =
    forward_host_env_vars =
    preinstall =
    preinstall_async = true
    preinstall_disabled = false

    [server]
    protocol = http
    min_tls_version = ""
    http_addr =
    http_port = {{ .Values.config.grafana.port }}
    domain = localhost
    enforce_domain = false
    root_url = %(protocol)s://%(domain)s:%(http_port)s/
    serve_from_sub_path = false
    router_logging = false
    static_root_path = public
    enable_gzip = false

    cert_file =
    cert_key =
    cert_pass =

    certs_watch_interval =

    socket_gid = -1

    socket_mode = 0660

    socket = /tmp/grafana.sock

    cdn_url =

    read_timeout = 0

    [server.custom_response_headers]

    [environment]
    local_file_system_available = true

    [grpc_server]
    network = "tcp"
    address = "127.0.0.1:10000"
    use_tls = false
    cert_file =
    key_file =
    enable_logging = false

    max_recv_msg_size =

    max_send_msg_size =

    [database]
    type = sqlite3
    host = 127.0.0.1:3306
    name = grafana
    user = root
    password =
    url =
    high_availability = true
    max_idle_conn = 2
    max_open_conn =
    conn_max_lifetime = 14400
    log_queries =
    ssl_mode = disable
    ssl_sni =
    isolation_level =

    ca_cert_path =
    client_key_path =
    client_cert_path =
    server_cert_name =

    path = grafana.db

    cache_mode = private

    wal = false

    migration_locking = true

    locking_attempt_timeout_sec = 0

    query_retries = 0

    transaction_retries = 5

    instrument_queries = false

    [remote_cache]
    type = database

    connstr =

    prefix =

    encryption =

    [dataproxy]

    logging = false

    timeout = 30

    dialTimeout = 10

    keep_alive_seconds = 30

    tls_handshake_timeout_seconds = 10

    expect_continue_timeout_seconds = 1

    max_conns_per_host = 0

    max_idle_connections = 100

    idle_conn_timeout_seconds = 90

    send_user_header = false

    response_limit = 0

    row_limit = 1000000

    user_agent =

    [analytics]
    reporting_enabled = true

    reporting_distributor = grafana-labs

    check_for_updates = true

    check_for_plugin_updates = true

    google_analytics_ua_id =

    google_analytics_4_id =

    google_analytics_4_send_manual_page_views = false

    google_tag_manager_id =

    rudderstack_write_key =

    rudderstack_data_plane_url =

    rudderstack_sdk_url =

    rudderstack_config_url =

    rudderstack_integrations_url =

    intercom_secret =

    application_insights_connection_string =

    application_insights_endpoint_url =

    feedback_links_enabled = true

    reporting_static_context =

    browser_console_reporter = false

    [security]
    disable_initial_admin_creation = false

    admin_user = admin

    admin_password = {{ .Values.config.grafana.adminPassword | default "" }}

    admin_email = admin@localhost

    secret_key = {{ .Values.config.grafana.secretKey | default (randAlphaNum 24) }}

    encryption_provider = secretKey.v1

    available_encryption_providers =

    disable_gravatar = false

    data_source_proxy_whitelist =

    disable_brute_force_login_protection = false

    brute_force_login_protection_max_attempts = 5

    disable_ip_address_login_protection = true

    cookie_secure = false

    cookie_samesite = lax

    allow_embedding = false

    strict_transport_security = false

    strict_transport_security_max_age_seconds = 86400

    strict_transport_security_preload = false

    strict_transport_security_subdomains = false

    x_content_type_options = true

    x_xss_protection = true

    content_security_policy = false

    content_security_policy_template = """script-src 'self' 'unsafe-eval' 'unsafe-inline' 'strict-dynamic' $NONCE;object-src 'none';font-src 'self';style-src 'self' 'unsafe-inline' blob:;img-src * data:;base-uri 'self';connect-src 'self' grafana.com ws://$ROOT_PATH wss://$ROOT_PATH;manifest-src 'self';media-src 'none';form-action 'self';"""

    content_security_policy_report_only = false

    content_security_policy_report_only_template = """script-src 'self' 'unsafe-eval' 'unsafe-inline' 'strict-dynamic' $NONCE;object-src 'none';font-src 'self';style-src 'self' 'unsafe-inline' blob:;img-src * data:;base-uri 'self';connect-src 'self' grafana.com ws://$ROOT_PATH wss://$ROOT_PATH;manifest-src 'self';media-src 'none';form-action 'self';"""

    angular_support_enabled = false

    csrf_always_check = false

    enable_frontend_sandbox_for_plugins =

    actions_allow_post_url =

    [security.encryption]
    data_keys_cache_ttl = 15m

    data_keys_cache_cleanup_interval = 1m

    [snapshots]
    enabled = true

    external_enabled = true
    external_snapshot_url = https://snapshots.raintank.io
    external_snapshot_name = Publish to snapshots.raintank.io

    public_mode = false


    [dashboards]
    versions_to_keep = 20

    min_refresh_interval = 5s

    default_home_dashboard_path =

    dashboard_performance_metrics =

    [datasources]
    datasource_limit = 5000

    concurrent_query_count = 10

    default_manage_alerts_ui_toggle = true

    [sql_datasources]
    max_open_conns_default = 100

    max_idle_conns_default = 100

    max_conn_lifetime_default = 14400

    [users]
    allow_sign_up = false

    allow_org_create = false

    auto_assign_org = true

    auto_assign_org_id = 1

    auto_assign_org_role = Viewer

    verify_email_enabled = false

    login_default_org_id =

    login_hint =
    password_hint =

    default_theme = dark

    default_language = en-US

    home_page =

    external_manage_link_url =
    external_manage_link_name =
    external_manage_info =

    viewers_can_edit = false

    editors_can_admin = false

    user_invite_max_lifetime_duration = 24h

    verification_email_max_lifetime_duration = 1h

    last_seen_update_interval = 15m

    hidden_users =

    [secretscan]
    enabled = false

    interval = 5m

    base_url = https://secret-scanning.grafana.net

    oncall_url =

    revoke = true

    [service_accounts]
    token_expiration_day_limit =

    [auth]
    login_cookie_name = grafana_session

    disable_login = false

    login_maximum_inactive_lifetime_duration =

    login_maximum_lifetime_duration =

    token_rotation_interval_minutes = 10

    disable_login_form = false

    disable_signout_menu = false

    signout_redirect_url =

    oauth_auto_login = false

    oauth_state_cookie_max_age = 600

    oauth_login_error_message = oauth.login.error

    oauth_refresh_token_server_lock_min_wait_ms = 1000

    api_key_max_seconds_to_live = -1

    sigv4_auth_enabled = false

    sigv4_verbose_logging = false

    azure_auth_enabled = false

    oauth_allow_insecure_email_lookup = false

    id_response_header_enabled = false

    id_response_header_prefix = X-Grafana

    id_response_header_namespaces = user api-key service-account

    managed_service_accounts_enabled = false

    [auth.passwordless]
