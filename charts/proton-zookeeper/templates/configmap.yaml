{{- if .Values.config.sasl.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "zookeeper.name" . }}-cm
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ template "zookeeper.name" . }}
data:
  jaas.conf: |
    Server {
          org.apache.zookeeper.server.auth.DigestLoginModule required
          {{- range $idx, $value := $.Values.config.sasl.user }}
          user_{{ $value.username }}="{{ $value.password }}"
          {{- end }}
          user_zkclient="{{ (index .Values.config.sasl.user 0).password }}";
    };

    Client {
          org.apache.zookeeper.server.auth.DigestLoginModule required
          username="zkclient"
          password="{{ (index .Values.config.sasl.user 0).password }}";
    };

    QuorumServer {
          org.apache.zookeeper.server.auth.DigestLoginModule required
          user_zkserver="{{ (index .Values.config.sasl.user 0).password }}";
    };

    QuorumLearner {
          org.apache.zookeeper.server.auth.DigestLoginModule required
          username="zkserver"
          password="{{ (index .Values.config.sasl.user 0).password }}";
    };
{{- end }}
