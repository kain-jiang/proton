{{- if and .Values.config.enableSSL (empty .Values.secret.secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "zookeeper.defaultSSLSecretName" . }}
  namespace: {{ .Values.namespace }}
type: Opaque
data: {}
  # SSL certificate, key, and keystore data must be provided at deploy time.
  # Do NOT commit real certificates or private keys to the repository.
  # Required keys: cert.pem, key.pem, keystore.jks, truststore.jks, truststorepassword
{{- end }}
