apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ template "proton-mq-nsq.name" . }}-nsqlookupd
  namespace: {{ .Values.namespace }}
spec:
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: {{ template "proton-mq-nsq.name" . }}-nsqlookupd
      component: nsqlookupd
  serviceName: {{ template "proton-mq-nsq.name" . }}-nsqlookupd
  {{- if .Values.service.nsqlookupd.haEnabled }}
  replicas: 2
  {{- else }}
  replicas: 1
  {{- end }}
  template:
    metadata:
      labels:
        app: {{ template "proton-mq-nsq.name" . }}-nsqlookupd
        component: nsqlookupd
    spec:
      securityContext:
        runAsUser: 5000
        runAsGroup: 5000
        fsGroup: 1099
      dnsConfig:
        options:
        - name: single-request-reopen
        - name: use-vc
      containers:
      - name: nsqlookupd
        image: {{ .Values.image.registry }}{{ .Values.image.nsq.repository }}:{{ .Values.image.nsq.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 4160
          name: tcp
        - containerPort: 4161
          name: http
      {{- with .Values.resources }}
        resources:
{{ toYaml . | indent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 2
        env:
        {{- range $key, $val := .Values.env }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end}}
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        command:
          - nsqlookupd
          - --log-level={{ .Values.service.logLevel }}
          - --broadcast-address=$(MY_POD_NAME).{{ template "proton-mq-nsq.name" . }}-nsqlookupd.{{ .Values.namespace }}
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ template "proton-mq-nsq.name" . }}-nsqlookupd
  namespace: {{ .Values.namespace }}
  labels:
    name: {{ template "proton-mq-nsq.name" . }}-nsqlookupd
spec:
{{- if .Values.service.enableDualStack }}
  ipFamilies:
  - IPv6
  - IPv4
  ipFamilyPolicy: PreferDualStack
{{- end }}
  selector:
    app: {{ template "proton-mq-nsq.name" . }}-nsqlookupd
    component: nsqlookupd
  ports:
  - port: {{ .Values.service.nsqlookupd.tcpPort }}
    name: tcp
    targetPort: 4160
    {{- if eq .Values.service.type "NodePort" }}
    {{- if .Values.service.nsqlookupd.tcpNodePort }}
    nodePort: {{ toYaml .Values.service.nsqlookupd.tcpNodePort }}
    {{- end }}
    {{- end }}
  - port: {{ .Values.service.nsqlookupd.httpPort }}
    name: http
    targetPort: 4161
    {{- if eq .Values.service.type "NodePort" }}
    {{- if .Values.service.nsqlookupd.httpNodePort }}
    nodePort: {{ toYaml .Values.service.nsqlookupd.httpNodePort }}
    {{- end }}
    {{- end }}
  type: {{ .Values.service.type }}
