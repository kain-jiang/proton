apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ template "proton-mq-nsq.name" . }}-nsqd
  namespace: {{ .Values.namespace }}
spec:
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: {{ template "proton-mq-nsq.name" . }}-nsqd
      component: nsqd
  serviceName: {{ template "proton-mq-nsq.name" . }}-nsqd
  replicas: {{ .Values.replicaCount }}
  template:
    metadata:
      labels:
        app: {{ template "proton-mq-nsq.name" . }}-nsqd
        component: nsqd
    spec:
      securityContext:
        runAsUser: 5000
        runAsGroup: 5000
        fsGroup: 1099
      containers:
      - name: nsqd
        image: {{ .Values.image.registry }}{{ .Values.image.nsq.repository }}:{{ .Values.image.nsq.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
               fieldPath: status.podIP
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        {{- range $key, $val := .Values.env }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end}}
        ports:
        - containerPort: 4150
          name: tcp
        - containerPort: 4151
          name: http
      {{- with .Values.resources }}
        resources:
{{ toYaml . | indent 10 }}
      {{- end }}
        livenessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 2
        volumeMounts:
        - name: proton-mq-nsq-datadir
          mountPath: /nsq-data
        command:
          - nsqd
          - --lookupd-tcp-address={{ template "proton-mq-nsq.name" . }}-nsqlookupd-0.{{ template "proton-mq-nsq.name" . }}-nsqlookupd.{{ .Values.namespace }}:{{ .Values.service.nsqlookupd.tcpPort }}
          {{- if .Values.service.nsqlookupd.haEnabled }}
          - --lookupd-tcp-address={{ template "proton-mq-nsq.name" . }}-nsqlookupd-1.{{ template "proton-mq-nsq.name" . }}-nsqlookupd.{{ .Values.namespace }}:{{ .Values.service.nsqlookupd.tcpPort }}
          {{- end }}
          - --broadcast-address=$(POD_IP)
          - --data-path=/nsq-data
          - --mem-queue-size=0
          - --log-level={{ .Values.service.logLevel }}
      terminationGracePeriodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: proton-mq-nsq-datadir
      namespace: {{ .Values.namespace }}
    spec:
      {{- if .Values.storage.storageClassName }}
      storageClassName: "{{ .Values.storage.storageClassName }}"
      {{- end}}
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.storage.capacity }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ template "proton-mq-nsq.name" . }}-nsqd
  namespace: {{ .Values.namespace }}
  labels:
    name: {{ template "proton-mq-nsq.name" . }}-nsqd
spec:
{{- if .Values.service.enableDualStack }}
  ipFamilies:
  - IPv6
  - IPv4
  ipFamilyPolicy: PreferDualStack
{{- end }}
  selector:
    app: {{ template "proton-mq-nsq.name" . }}-nsqd
    component: nsqd
  ports:
  - port: {{ .Values.service.nsqd.tcpPort }}
    name: tcp
    targetPort: 4150
    {{- if eq .Values.service.type "NodePort" }}
    {{- if .Values.service.nsqd.tcpNodePort }}
    nodePort: {{ toYaml .Values.service.nsqd.tcpNodePort }}
    {{- end }}
    {{- end }}
  - port: {{ .Values.service.nsqd.httpPort }}
    name: http
    targetPort: 4151
    {{- if eq .Values.service.type "NodePort" }}
    {{- if .Values.service.nsqd.httpNodePort }}
    nodePort: {{ toYaml .Values.service.nsqd.httpNodePort }}
    {{- end }}
    {{- end }}
  type: {{ .Values.service.type }}
