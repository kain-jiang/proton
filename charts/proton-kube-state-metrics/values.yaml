# Default values for prometheus-k8s.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

namespace: "default"

replicas: 1

env:
  timezone: Asia/Shanghai

image:
  registry: acr.aishu.cn
  pullPolicy: IfNotPresent
  KubeStateMetrics:
    repository: proton/kube-state-metrics
    tag: v2.4.2

resources: 
  limits:
    cpu: 500m
    memory: 500Mi
  requests:
    cpu: 10m
    memory: 50Mi
