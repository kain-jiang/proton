{{- if (eq .Values.config.nodeGroup "master") }}
{{- $ca := genCA "proton-opensearch-ca" 3650 }}
{{- $san := list "*.opensearch.svc.cluster.local" "*.default.svc.cluster.local" "*.anyrobot.svc.cluster.local" "*.resources.svc.cluster.local" }}
{{- $nodeCert := genSignedCert "proton-node@aishu.cn" (list "127.0.0.1") $san 3650 $ca }}
{{- $clientCert := genSignedCert "proton-client@aishu.cn" nil nil 3650 $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "opensearch.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ template "opensearch.name" . }}
    cluster: {{ .Values.config.clusterName }}
type: Opaque
stringData:
  root-ca.pem: |
{{ $ca.Cert | indent 4 }}
  node.pem: |
{{ $nodeCert.Cert | indent 4 }}
  node-key.pem: |
{{ $nodeCert.Key | indent 4 }}
  client.pem: |
{{ $clientCert.Cert | indent 4 }}
  client-key.pem: |
{{ $clientCert.Key | indent 4 }}
{{- end }}
