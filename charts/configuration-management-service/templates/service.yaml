apiVersion: v1
kind: Service
metadata:
  name: {{ include "configuration-management.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
{{ include "configuration-management.labels" . | indent 4 }}
spec:
{{- if .Values.service.enableDualStack }}
  ipFamilies:
  - IPv6
  - IPv4
  ipFamilyPolicy: PreferDualStack
{{- end }}
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "configuration-management.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
