{{- if and .Values.enableSSL (empty .Values.secret.secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "redis.name" . }}-ssl-secret
  namespace: {{ $.Values.namespace }}
type: Opaque
data: {}
  # SSL certificate and key data must be provided at deploy time.
  # Do NOT commit real certificates or private keys to the repository.
  # Required keys: {{ .Values.secret.caName }}, {{ .Values.secret.certName }}, {{ .Values.secret.keyName }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "redis.name" . }}-secret
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  password: {{ .Values.redis.rootPassword | b64enc }}
  nonEncrpt-password: {{ .Values.redis.rootPassword | b64enc }}
  monitor-password: {{ .Values.redis.rootPassword | b64enc }}
  sentinel-password: {{ .Values.redis.rootPassword | b64enc }}
