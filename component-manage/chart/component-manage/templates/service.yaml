apiVersion: v1
kind: Service
metadata:
  name: {{ template "component-manage.name" . }}
  namespace: {{ template "component-manage.namespace" . }}
  labels:
    {{- include "component-manage.labels" . | nindent 4 }}
spec:
{{- if .Values.service.enableDualStack }}
  ipFamilies:
  - IPv6
  - IPv4
  ipFamilyPolicy: PreferDualStack
{{- end }}
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "component-manage.name" . }}
