# Go
# Build your Go project.
# Add steps that test, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/go

trigger:
  - master

resources:
  containers:
    - container: builder
      image: acr.aishu.cn/ict/proton/sophon/build-image:20220617

variables:
  - name: CONTROLLER_VERSION
    value: '1.2.2'
  - name: CONTROLLER_IMAGE_REGISTRY
    value: acr.aishu.cn
  - name: CONTROLLER_IMAGE_REPOSITORY
    value: proton/mongodb-controller
  - name: TAG

stages:
  - stage: Build
    jobs:
      - job: Chart
        pool:
          name: ASDeployment
          demands:
            - Agent.OSArchitecture -equals X64
            - Agent.OS -equals Linux
            - docker
        container: builder
        steps:
          - task: Docker@2
            displayName: Login acr.aishu.cn
            inputs:
              command: login
              containerRegistry: ProtonACR
          - bash: |
              if [[ $(Build.SourceBranchName) =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]];then
                if [[ $(Build.SourceBranchName) != ${CONTROLLER_VERSION} ]]; then
                  exit 1
                fi
                echo "##vso[task.setvariable variable=TAG]$(Build.SourceBranchName)"
              else
                echo "##vso[task.setvariable variable=TAG]${CONTROLLER_VERSION}-$(Build.SourceBranchName)"
              fi
            displayName: Set Tag
          - bash: |
              sed -i 's/tag: VERSION/tag: $(TAG)/' chart/mongodb-operator/values.yaml
              sed -i 's/^version.*/version: $(TAG)/' chart/mongodb-operator/Chart.yaml
              sed -i 's/^appVersion.*/appVersion: $(Build.SourceVersion)/' chart/mongodb-operator/Chart.yaml
              CREDENTIALS=$(jq -r '.auths."https://acr.aishu.cn".auth' ${DOCKER_CONFIG}/config.json)
              cd chart
              helm package mongodb-operator --version=$(TAG)
              ls
              curl -X POST -fvL \
                -H "Authorization: Basic ${CREDENTIALS}" \
                -H "Content-Type: multipart/form-data" \
                -F "chart=@mongodb-operator-$(TAG).tgz;type=type=application/x-compressed-tar" \
                https://acr.aishu.cn/api/chartrepo/proton/charts
            displayName: Create And Push Chart
      - job: ContainerImage
        strategy:
          matrix:
            amd64:
              arch: amd64
              poolAgentOSArchitecture: X64
            arm64:
              arch: arm64
              poolAgentOSArchitecture: ARM64
          maxParallel: 2
        pool:
          name: ASDeployment
          demands:
            - Agent.OSArchitecture -equals $(poolAgentOSArchitecture)
            - Agent.OS -equals Linux
            - docker
        container: builder
        steps:
          - bash: |
              if [[ $(Build.SourceBranchName) =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]];then
                if [[ $(Build.SourceBranchName) != ${CONTROLLER_VERSION} ]]; then
                  exit 1
                fi
                echo "##vso[task.setvariable variable=TAG]$(Build.SourceBranchName)"
              else
                echo "##vso[task.setvariable variable=TAG]${CONTROLLER_VERSION}-$(Build.SourceBranchName)"
              fi
            displayName: Set Tag
          - task: Docker@2
            displayName: Build
            inputs:
              command: build
              arguments: --build-arg ARCH=$(arch)
              containerRegistry: ProtonACR
              repository: proton/mongodb-controller-$(arch)
              Dockerfile: Dockerfile.proton
              tags: |
                $(TAG)
          - task: Docker@2
            displayName: Push
            inputs:
              command: push
              containerRegistry: ProtonACR
              repository: proton/mongodb-controller-$(arch)
              tags: |
                $(TAG)
      - job: Manifest
        pool:
          name: ASDeployment
          demands:
            - Agent.OSArchitecture -equals X64
            - Agent.OS -equals Linux
            - docker
        container: builder
        dependsOn:
          - ContainerImage
        steps:
          - bash: |
              if [[ $(Build.SourceBranchName) =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]];then
                if [[ $(Build.SourceBranchName) != ${CONTROLLER_VERSION} ]]; then
                  exit 1
                fi
                echo "##vso[task.setvariable variable=TAG]$(Build.SourceBranchName)"
              else
                echo "##vso[task.setvariable variable=TAG]${CONTROLLER_VERSION}-$(Build.SourceBranchName)"
              fi
            displayName: Set Tag
          - task: Docker@2
            displayName: Login acr.aishu.cn
            inputs:
              command: login
              containerRegistry: ProtonACR
          - bash: |
              docker manifest create ${CONTROLLER_IMAGE_REGISTRY}/${CONTROLLER_IMAGE_REPOSITORY}:$(TAG) ${CONTROLLER_IMAGE_REGISTRY}/${CONTROLLER_IMAGE_REPOSITORY}-amd64:$(TAG) ${CONTROLLER_IMAGE_REGISTRY}/${CONTROLLER_IMAGE_REPOSITORY}-arm64:$(TAG)
              docker manifest push -p ${CONTROLLER_IMAGE_REGISTRY}/${CONTROLLER_IMAGE_REPOSITORY}:$(TAG)
            displayName: Create manifest
