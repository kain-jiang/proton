zookeeper:
  hosts:
    - node1
    - node2
    - node3
  data_path: /sysvol/zookeeper/zookeeper_data
  # 根据 AnyRobot 性能测试的推荐资源配额
  # arch: arm, node:   1, cpu:  96, memory: 128
  env:
    JVMFLAGS: -Xms500m -Xmx500m
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 270Mi
# Proton 可观测服务使用的 Prometheus
prometheus:
  # 一体机环境 Prometheus 运行在下列节点
  hosts:
    - node1
    - node2
  # 一体机环境 Prometheus 使用每个节点的下列路径作为数据目录
  data_path: /sysvol/prometheus

# Proton 可观测服务使用的 Grafana
grafana:
  # 一体机环境 Grafana 运行在下列节点
  hosts:
    - node1
  # 一体机环境 Grafana 使用每个节点的下列路径作为数据目录
  data_path: /sysvol/grafana

# AnyData 使用的 Nebula Graph，Nebula不支持托管云部署
nebula:
  hosts:
    - node1
    - node2
    - node3
  data_path: /sysvol/nebula
  # 未指定密码时，生成随机密码。部署完成后通过 proton-cli get conf 获取。
  # password: 12450

# 基础组件连接信息统一管理，用到业务账号的内置组件除之前的配置外，还需在此处填写业务账号用户名和密码；
resource_connect_info:
  rds:
    source_type: internal
    username: FAKE_USERNAME
    password: FAKE_PASSWORD

  mongodb:
    source_type: internal
    username: FAKE_USERNAME
    password: FAKE_PASSWORD

  redis:
    source_type: internal

  mq:
    source_type: internal

  opensearch:
    source_type: internal

  policy_engine:
    source_type: internal

  etcd:
    source_type: internal
