#      cpu: "4"
#      memory: 10Gi
#  exporter_resources:
#    limits:
#      cpu: 200m
#      memory: 800Mi
#    requests:
#      cpu: 200m
#      memory: 800Mi

zookeeper:
  # 申请的存储卷大小
  storage_capacity: 
  replica_count: 1
  storageClassName: csi-disk
  # 根据 AnyRobot 性能测试的推荐资源配额
  # arch: arm, node:   1, cpu:  96, memory: 128
  env:
    JVMFLAGS: -Xms500m -Xmx500m
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 270Mi

# # Proton 可观测服务使用的 Prometheus
prometheus:
  # 申请的存储卷大小
  storage_capacity: 
  # 托管 Kubernetes 环境 Prometheus 使用下列 Storage Class 作为持久化数据
  storageClassName: standard

# # Proton 可观测服务使用的 Grafana
grafana:
  # 申请的存储卷大小
  storage_capacity: 
  # 托管 Kubernetes 环境 Grafana 使用下列 Storage Class 作为持久化数据
  storageClassName: standard

# 基础组件连接信息统一管理，用到业务账号的内置组件除之前的配置外，还需在此处填写业务账号用户名和密码；
# 组件外置时，所有信息在这里填写
resource_connect_info:
  rds:
    source_type: external
    rds_type: MySQL #DM8 MySQL GoldenDB TiDB KDB9
    hosts: ""  # 外置组件地址，多个英文逗号分隔
    port: 12345   #整型，多副本时，端口必须一样
    username: ""
    password: ""

  mongodb:
    source_type: external
    hosts: ""  # 外置组件地址，多个英文逗号分隔
    port: 12345
    replica_set: "" #副本集名称
    username: ""
    password: ""
    ssl: false #boolean 类型值，是否开启ssl，可选，默认不开启
    auth_source: "" #登录验证数据库名称
    # 其它可选参数
    options:
      key1: value1
      key2: value2

# redis三种模式
