  #   username: ""
  #   password: ""

  # external mq
  mq:
    source_type: external
    mq_type: kafka # nsq tonglink htp20 kafka bmq
    mq_hosts: "" #mq工作节点访问地址，多个时用英文逗号分隔
    mq_port: 12345  #整型，多副本时，端口必须保持一样
    mq_lookupd_hosts: "" #mq管理节点访问地址，多个时用英文逗号分隔；非nsq不填
    mq_lookupd_port:  #多副本时，端口必须保持一样；非nsq不填
    auth:   # 当前只有kafka支持配置auth，其它中间件不填
      username: ""
      password: ""
      mechanism: "PLAIN" # SCRAM-SHA-512 SCRAM-SHA-256 PLAIN

  # external opensearch
  opensearch:
    source_type: external
    hosts: "" #服务访问地址，多个时用英文逗号分隔
    port:   #整型，多副本时，端口必须保持一样
    username: ""
    password: ""
    version: 7.10.0 # 5.6.4 7.10.0

  policy_engine:
    source_type: external
    hosts: "" #服务访问地址，多个时用英文逗号分隔
    port: 12345  #整型，多副本时，端口必须保持一样

  etcd:
    source_type: external
    hosts:  "" #节点访问地址，多个时用英文逗号分隔
    port: 12345   #整型，多副本时，端口必须保持一样
    secret: ""