apiVersion: v1

deploy:
  mode: cloud
  devicespec: Managed-Cloud
  namespace: resource

cs:
  provisioner: external

cr:
  external:
    chart_repository: chartmuseum
    image_repository: registry
    registry:
      host: registry.example.org
      username: sample-username
      password: sample-password
    chartmuseum:
      host: chartmuseum.example.org
      username: sample-username
      password: sample-password

# proton-mariadb
proton_mariadb:
  replica_count: 1
  # 申请的存储卷大小
  storage_capacity: 
  config:
    innodb_buffer_pool_size: 8G
    resource_requests_memory: 24G
    resource_limits_memory: 24G
  admin_user: FAKE_USERNAME
  admin_passwd: FAKE_PASSWORD
  storageClassName: csi-disk

# mongodb
proton_mongodb:
  replica_count: 1
  # 申请的存储卷大小
  storage_capacity: 
  admin_user: FAKE_USERNAME
  admin_passwd: FAKE_PASSWORD
  storageClassName: csi-disk

# redis
proton_redis:
  replica_count: 1
  # 申请的存储卷大小
  storage_capacity: 
  admin_user: FAKE_USERNAME
  admin_passwd: FAKE_PASSWORD
  storageClassName: csi-disk

#proton-mq-nsq
proton_mq_nsq:
  replica_count: 1
  # 申请的存储卷大小
  storage_capacity: 
  storageClassName: csi-disk

# policy-engine
# 不超过3个，最多支持 3 副本
proton_policy_engine:
  replica_count: 1
  # 申请的存储卷大小
  storage_capacity: 
  storageClassName: csi-disk

# policy-etcd
# 不超过3个，最多支持 3 副本
proton_etcd:
  replica_count: 1
  # 申请的存储卷大小
  storage_capacity: 
  storageClassName: csi-disk

# opensearch
opensearch:
  # 申请的存储卷大小
  storage_capacity: 
  replica_count: 1
  # mode 可以为 hot, master, warm
  mode: master
  config: # 可选配置(如果配置为空，请注意显式设置为{})， 键值对值为null代表移除配置，恢复默认
    jvmOptions: -Xmx8g -Xms8g # JVM内存设置
    hanlpRemoteextDict: http://ecoconfig-private.anyshare:32128/api/ecoconfig/v1/word-list/remote_ext_dict # 远程词库
    hanlpRemoteextStopwords: http://ecoconfig-private.anyshare:32128/api/ecoconfig/v1/word-list/remote_ext_stopwords # 远程去停词
  storageClassName: csi-disk
  ## OpenSearch 的原生参数
  ## Detail: "https://opensearch.org/docs/latest/security/configuration/yaml/#opensearchyml"
  settings:
    cluster.routing.allocation.disk.watermark.flood_stage: 70%
    cluster.routing.allocation.disk.watermark.high: 65%
    cluster.routing.allocation.disk.watermark.low: 60%
## OpenSearch 需求的资源
