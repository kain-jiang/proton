---
namespace: prometheus
image:
  registry: registry.example.org
replicaCount: 2
service:
  enableDualStack: false
storage:
  local:
    "0":
      host: node-0
      path: /var/lib/prometheus
    "1":
      host: node-1
      path: /var/lib/prometheus
secret:
  k8sEtcd:
    enabled: true
    secretName: k8s-etcdssl-secret-for-prometheus
    caName: ca-k8setcd.crt
    certName: prometheus-metrics-k8setcd.crt
    keyName: prometheus-metrics-k8setcd.key
  protonEtcd:
    enabled: true
    secretName: etcdssl-secret-for-prometheus
    caName: ca-protonetcd.crt
    certName: prometheus-metrics-protonetcd.crt
    keyName: prometheus-metrics-protonetcd.key