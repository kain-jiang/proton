          2: 任务等待执行;
          3: 任务正在执行;
          4: 任务执行成功;
          5: 任务失败;
          6: 任务已暂停;
          7: 任务停止中;
          8: 任务缺少依赖组件,失败;
          9: 任务卸载上一版本组件失败;
          11: 删除上一版本组件中;
          12: 目标版本服务更新完毕;
          13: 父组件更新阶段;
