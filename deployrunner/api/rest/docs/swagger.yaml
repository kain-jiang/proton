      name:
        description: 应用包名称
        type: string
      namespace:
        description: 系统运行的k8s命名空间
        type: string
      operateType:
        description: |-
          操作类型.
          值0,1和2分别对应更新,安装和回滚,这三个值仅用于使用者对任务进行标记,内部逻辑无差异.
          3 为删除操作
        type: integer
