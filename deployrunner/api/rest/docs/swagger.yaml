info:
  contact:
    email: tiga.gan@aishu.cn
    name: API Support
  description: 安装/更新执行器HTTP API接口文档
  title: 安装/更新执行器HTTP API文档
  version: 0.1.0
paths:
  /agents/chart:
    put:
      consumes:
      - application/octet-stream
      description: 在当前的CR里推送此chart包，并返回Chart基本信息
      produces:
      - application/json
      responses:
        "200":
          description: Chart信息
          schema:
            $ref: '#/definitions/api_rest.respUploadChart'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 代理实现上传一个chart包
      tags:
      - agents
  /agents/image:
    put:
      consumes:
      - application/octet-stream
      description: 在当前的CR里推送此镜像包，并返回镜像基本信息
      produces:
      - application/json
      responses:
        "200":
          description: 镜像信息
          schema:
            $ref: '#/definitions/api_rest.respUploadOCIImage'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 代理实现上传一个oci镜像包
      tags:
      - agents
  /agents/release/:name:
    put:
      consumes:
      - application/json
      description: 在当前的系统安装/更新一个chart，并返回创建的release信息
      parameters:
      - description: Release名
        in: path
        name: name
        required: true
        type: string
      - description: 命名空间
        in: query
        name: namespace
        required: true
        type: string
      - description: 设置仓库地址，默认设置
        in: query
        name: set-registry
        type: boolean
      - description: 安装信息信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api_rest.reqInstallRelease'
      produces:
      - application/json
      responses:
        "200":
          description: Release信息
          schema:
            $ref: '#/definitions/api_rest.respInstallRelease'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 代理实现安装一个helm chart
      tags:
      - agents
  /agents/release/{name}:
    put:
      description: 在当前的系统卸载一个release
      parameters:
      - description: Release名
        in: path
        name: name
        required: true
        type: string
      - description: 命名空间
        in: query
        name: namespace
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Release信息
          schema:
            $ref: '#/definitions/api_rest.respUninstallRelease'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 代理实现卸载一个helm实例
      tags:
      - agents
  /application:
    get:
      consumes:
      - application/json
      description: |-
        获取特定应用包列表,并提供分页滚动查询能力,当分页内为空时表示无下一分页。
        当name参数为空时分页内为不同名称的应用包,不含相同名称的不同版本信息。
      parameters:
      - description: 语言参数
        in: query
        name: lang
        type: string
      - description: 分页内最后一个应用包ID或以-1起始分页查询，默认-1
        in: query
        name: offset
        type: integer
      - description: 分页大小,默认20
        in: query
        name: limit
        type: integer
      - description: 系统ID，多实例模式必填
        in: query
        name: sid
        type: integer
      - description: 应用包名
        in: query
        name: name
        type: string
      - description: 是否过滤已安装的应用
        in: query
        name: nowork
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/trait.ApplicationMeta'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 获取已上传的应用包列表
      tags:
      - application
    post:
      consumes:
      - multipart/form-data
      - application/octet-stream
      description: 上传应用包文件,接口将会解析包内容并保存
      parameters:
      - description: File to upload content-type is multipart/form-data
        in: formData
        name: file
        type: file
      - description: File to upload when content-type is octet-stream
        in: body
        name: file
        schema:
          items:
            type: integer
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: 返回应用包ID
          schema:
            type: integer
        "400":
          description: 客户端请求参数错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "409":
          description: 客户端重复上传应用包
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 上传应用包
      tags:
      - application
  /application/{id}:
    get:
      consumes:
      - application/json
      description: 通过应用包ID获取应用详细信息
      parameters:
      - description: 语言参数
        in: query
        name: lang
        type: string
      - description: 应用包ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/trait.Application'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 获取应用详细信息
      tags:
      - application
  /application/autodependence:
    post:
      consumes:
      - application/json
      description: 解析请求中的应用数组对应应用包的依赖信息,实际应该的部署、更新内容
      parameters:
      - description: SystemID
        in: query
        name: sid
        required: true
        type: string
      - description: 应用包选择列表
        in: body
        name: apps
        required: true
        schema:
          items:
            $ref: '#/definitions/api_rest.AppChoosed'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/api_rest.AppChoosedResult'
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 解析请求中的应用数组对应应用包的依赖信息,实际应该的部署、更新内容
      tags:
      - application
  /application/config:
    get:
      consumes:
      - application/json
      description: 该接口主要用于从任务视图或组件视图视角查看任务执行信息
      parameters:
      - description: 分页偏移量
        in: query
        name: offset
        type: integer
      - description: 分页大小
        in: query
        name: limit
        type: integer
      - collectionFormat: csv
        description: 设置标签过滤器中标签,如'http://127.0.0.1/test?l=test0&l=test1'
        in: query
        items:
          type: string
        name: l
        type: array
      - description: 标签过滤器类型，0或1或不设置时为'或'关系，2为'与关系'
        in: query
        name: lc
        type: integer
      - description: 设置版本过滤器中版本，非空时启用
        in: query
        name: v
        type: string
      - description: 版本过滤器类型,0或1或不设置时为精准匹配,2为patch版本匹配,3为大于等于当前版本匹配
        in: query
        name: vt
        type: integer
      - description: 应用名过滤条件,为空时其余过滤器不可设置
        in: query
        name: aname
        type: string
      - description: 是否返回对应过滤条件下的数据数量，false或False为否，其余为是，一般在分页查询仅第一次查询时设置为是
        in: query
        name: count
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 结果列表
          schema:
            $ref: '#/definitions/api_rest.ConfigTempalteList'
        "400":
          description: 客户端请求参数错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 根据过滤需要获取配置模板
      tags:
      - application
    post:
      consumes:
      - application/json
      description: |-
        上传一个应用配置模板，该模板可在以当前系统运行应用实例配置时，与之合并返回。
        一个应用配置模板以<aname, tname, tversion>作为唯一索引，如果该模板已存在，则覆盖已存在模板。
        覆盖逻辑中，组合唯一索引字段外将会被更新。
      parameters:
      - description: 应用配置模板内容
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/trait.AppliacationConfigTemplate'
      produces:
      - application/json
      responses:
        "200":
          description: 配置模板ID
          schema:
            type: integer
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 上传一个应用配置模板
      tags:
      - application
  /application/config/{tid}:
    delete:
      consumes:
      - application/json
      description: 删除应用配置模板
      parameters:
      - description: 应用配置模板ID
        in: path
        name: tid
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
        "400":
          description: 客户端请求参数错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 删除应用配置模板
      tags:
      - application
    get:
      consumes:
      - application/json
      description: 获取应用配置模板详细内容
      parameters:
      - description: 应用配置模板ID
        in: path
