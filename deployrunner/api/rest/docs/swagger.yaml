            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 删除当前系统指定应用
      tags:
      - job
    get:
      consumes:
      - application/json
      description: |-
        获取任务列表,列表内为概要信息,支持分页滚动查询
        列表内为概要信息,只有当前应用实例ID，目标应用实例ID、状态名称和任务ID为有效数据
      parameters:
      - description: 分页偏移量
        in: query
        name: offset
        type: integer
      - description: 系统ID
        in: query
        name: sid
        type: integer
      - description: 应用名称,区分大小写
        in: query
        name: name
        type: string
      - collectionFormat: csv
        description: 状态过滤器设置,多个状态间关系为'或关系'
        in: query
        items:
          type: string
        name: status
        type: array
      - description: 分页大小
        in: query
        name: limit
        type: integer
      - collectionFormat: csv
        description: 任务类型过滤,默认不过滤
        in: query
        items:
          type: integer
        name: jtype
        type: array
      - description: 对应语言的包名
        in: query
