        description: 执行应用实例安装/升级的执行器的ID,正整数时表示在集群执行器内执行,为0表示未占有执行器,为负数时代表为命令行同步执行器执行
        type: integer
      sid:
        description: 系统ID
        type: integer
      startTime:
        description: 任务开始时间
        type: integer
      status:
        description: |-
          任务实例执行阶段与状态,
