      tags:
      - composejob
    put:
      consumes:
      - application/json
      description: 通过任务ID尝试暂停任务，应通过查询接口查看最终状态
      produces:
      - application/json
      responses:
        "200":
          description: 返回空
          schema:
            type: integer
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "404":
          description: 对象不存在
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "500":
          description: 系统异常或内部错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
      summary: 尝试暂停任务
      tags:
      - composejob
  /job:
    delete:
      consumes:
      - application/json
      description: 创建当前系统指定应用删除任务,并启动对应任务
      parameters:
      - description: 系统空间ID,多实例下必填
        in: query
        name: sid
        type: integer
      - description: 忽略依赖检查,强制卸载,默认检查
        in: query
        name: force
        type: boolean
      - description: 应用标识名称
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 返回任务jid
          schema:
            type: integer
        "400":
          description: 客户端请求参数错误
