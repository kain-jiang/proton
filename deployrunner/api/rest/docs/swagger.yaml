  /composejob:
    get:
      consumes:
      - application/json
      description: 批量操作任务列表
      parameters:
      - description: header值为schema时相应格式为套件配置格式
        in: header
        name: app-format
        type: string
      - description: 语言参数
        in: query
        name: lang
        type: string
      - description: 套件名
        in: query
        name: name
        required: true
        type: string
      - collectionFormat: csv
        description: 状态过滤器设置,多个状态间关系为'或关系'
        in: query
        items:
          type: integer
        name: status
        type: array
      - description: 对应语言的包名
        in: query
        name: title
        type: string
      - description: 分页数
        in: query
        name: limit
        type: integer
      - description: 偏移量
        in: query
        name: offset
        type: integer
      - description: 任务类型过滤,0为所有任务,1为一般任务,2为套件任务,默认为1
        in: query
        name: type
        type: integer
      - description: 系统空间ID
        in: query
        name: sid
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 返回套件配置清单
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.ComposeJobMetaList'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "404":
          description: 对象不存在
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "500":
          description: 系统异常或内部错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
      summary: 批量操作任务列表
      tags:
      - composejob
    post:
      consumes:
      - application/json
      description: 创建批量执行任务,当设置header字段app-formatt为schema值时接收套件配置格式
      parameters:
      - description: 套件配置
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/api_rest_proton_component_compose.ManifestsJob'
      - description: header值为schema时请求体格式为套件配置格式
        in: header
        name: app-format
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 返回为任务ID
          schema:
            type: integer
        "400":
          description: 客户端请求参数错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "404":
          description: 对象不存在，不允许更新
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "412":
          description: 不允许设置任务配置
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
      summary: 创建批量执行任务
      tags:
      - composejob
  /composejob/{jid}:
    get:
      consumes:
      - application/json
      description: 通过任务ID获取任务信息
      parameters:
      - description: header值为schema时相应格式为套件配置格式
        in: header
        name: app-format
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 返回任务信息
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.ManifestsJob'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "404":
          description: 对象不存在
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "500":
          description: 系统异常或内部错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
      summary: 获取任务信息
      tags:
      - composejob
    post:
      consumes:
      - application/json
      description: 通过任务ID尝试启动任务，应通过查询接口查看最终状态
      produces:
      - application/json
      responses:
        "200":
          description: 返回空
          schema:
            type: integer
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "404":
          description: 对象不存在
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
        "500":
          description: 系统异常或内部错误
          schema:
            $ref: '#/definitions/api_rest_proton_component_compose.HTTPError'
