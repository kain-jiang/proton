          schema:
            $ref: '#/definitions/trait.AppliacationConfigTemplate'
        "400":
          description: 客户端请求参数错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "404":
          description: 对象不存在
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 获取应用配置模板详细内容
      tags:
      - application
  /application/dependencesort:
    put:
      consumes:
      - application/json
      description: 解析请求中的应用数组对应应用包的依赖信息,返回安装行为顺序.当各个应用未完整填写自身依赖信息时,获得的顺序可能有误
      parameters:
      - description: 语言参数
        in: query
        name: lang
        type: string
      - description: 是否基于当前系统进行缺失依赖检查,默认为true
        in: query
        name: check_system
        type: boolean
      - description: 应用包列表
        in: body
        name: apps
        required: true
        schema:
          items:
            $ref: '#/definitions/api_rest.AppMetaWithLang'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_rest.InstallSort'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 解析请求中的应用数组对应应用包的依赖信息,返回安装行为顺序
      tags:
      - application
  /application/instance/work:
    get:
      consumes:
      - application/json
      description: |-
        获取已安装应用实例列表，支持的过滤参数有name与status，分别过滤应用名称与状态。
        当name参数非空时，以name为筛选条件。
        当status非空时，以status为筛选条件。
        当两个筛选条件为空时，为正常获取当前已安装应用实例列表
      parameters:
      - description: 分页偏移量
        in: query
        name: offset
        required: true
        type: integer
      - description: 系统ID,多实例模式必填
        in: query
        name: sid
        required: true
        type: integer
      - description: 应用名称,区分大小写
        in: query
        name: name
        type: string
      - collectionFormat: csv
        description: 状态过滤器设置,多个状态间关系为'或关系'
        in: query
        items:
          type: integer
        name: status
        type: array
      - description: 分页大小
        in: query
        name: limit
        required: true
        type: integer
      - description: 语言参数
        in: query
        name: lang
        type: string
      - description: 对应语言的包名
        in: query
        name: title
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 工作应用实例分页
          schema:
            $ref: '#/definitions/api_rest.pageWorkAppIns'
        "400":
          description: 客户端请求参数错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
        "500":
          description: 系统内部错误
          schema:
            $ref: '#/definitions/api_rest.HTTPError'
      summary: 获取已安装应用实例列表
      tags:
      - applicationInstance
      - application
  /application/name/{name}/{version}:
