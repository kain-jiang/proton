{{ if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "deploy-installer.serviceAccountName" . }}
  namespace: {{ template "deploy-installer.namespace" . }}
  labels:
    {{- include "deploy-installer.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "deploy-installer.namespace" . }}:{{ template "deploy-installer.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "deploy-installer.namespace" . }}-{{ .Values.serviceAccount.clusterRole.name }}
subjects:
  - kind: ServiceAccount
    name: {{ template "deploy-installer.serviceAccountName" . }}
    namespace: {{ template "deploy-installer.namespace" . }}

{{ if .Values.serviceAccount.clusterRole.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "deploy-installer.namespace" . }}-{{ .Values.serviceAccount.clusterRole.name }}
rules:
  - apiGroups:
      - "*"
    resources:
      - '*'
    verbs:
      - "*"
{{- end -}}
{{- end -}}