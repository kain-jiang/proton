- Command: execute
  args:
    transaction: false
    Statements:
      - >
        CREATE TABLE IF NOT EXISTS task_sqldata_upgrade (
          dateid INT,
          stage INT,
          epoch  INT,
          porder  INT,
          status INT,
          oporder INT,
          opstatus INT,
          tempdata BLOB,
          svcname VARCHAR(100),
          PRIMARY KEY(dateid,svcname)
        );
